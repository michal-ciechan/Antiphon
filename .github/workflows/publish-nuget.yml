name: publish-nuget

# Packs the three Antiphon.Messaging* packages and pushes them to GitHub Packages.
# --skip-duplicate makes re-runs of an already-published version a no-op, so this
# is safe to run on every master push; bump src/Messaging.Pack.props to release.

on:
  push:
    branches: [master]
    paths:
      - "src/Antiphon.Messaging/**"
      - "src/Antiphon.Messaging.Client/**"
      - "src/Antiphon.Messaging.Client.Testing/**"
      - "src/Messaging.Pack.props"
      - ".github/workflows/publish-nuget.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - name: Pack
        run: |
          dotnet pack src/Antiphon.Messaging/Antiphon.Messaging.csproj -c Release -o out
          dotnet pack src/Antiphon.Messaging.Client/Antiphon.Messaging.Client.csproj -c Release -o out
          dotnet pack src/Antiphon.Messaging.Client.Testing/Antiphon.Messaging.Client.Testing.csproj -c Release -o out
      - name: Push to GitHub Packages
        run: >
          dotnet nuget push "out/*.nupkg"
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --api-key "${{ secrets.GITHUB_TOKEN }}"
          --skip-duplicate
