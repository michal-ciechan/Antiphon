# docker-compose.dev.yml — always-on PostgreSQL for local development.
#
# This is the single Postgres instance for BOTH launch modes:
#   - standalone server (dev-start.ps1)            → connects to localhost:17280
#   - Aspire AppHost (dev-aspire.ps1)              → AddConnectionString points here too
#
# restart: unless-stopped + Docker Desktop "AutoStart" means this container comes
# back automatically on login/boot, so the backend (and the agents that depend on
# it) are always available without launching the AppHost. Bring it up once with:
#   docker compose -f docker-compose.dev.yml up -d
# or run scripts/install-autostart.ps1, which does this and registers the
# session-runner logon task.
name: antiphon

services:
  postgres:
    image: postgres:16
    container_name: antiphon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: antiphon
      POSTGRES_USER: antiphon
      POSTGRES_PASSWORD: antiphon_dev
    ports:
      - "17280:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antiphon -d antiphon"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  # Local Kafka-compatible broker for the channel bridge dev loop: the fake gateway (17208)
  # produces channels.inbound here and consumes channels.outbound; the dev server's bridge
  # consumes/produces the same topics (AntiphonMessaging: localhost:19092). The REAL Telegram
  # gateway is never run locally — this broker exists purely so the whole bridge path is
  # exercisable offline.
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: antiphon-redpanda
    restart: unless-stopped
    # Single listener advertised as localhost:19092 — every client (fake gateway, dev server)
    # connects from the HOST. A second in-container listener once broke consumer-group
    # coordinator discovery (producers worked, consumers never joined), so: one listener only.
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://localhost:19092
    ports:
      - "19092:19092"
    volumes:
      - redpanda:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --exit-when-healthy --brokers localhost:19092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  pgdata:
  redpanda:
