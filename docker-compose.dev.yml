# docker-compose.dev.yml — PostgreSQL only for local development
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: antiphon
      POSTGRES_USER: antiphon
      POSTGRES_PASSWORD: antiphon_dev
    ports:
      - "17280:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antiphon -d antiphon"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  pgdata:
